AWSTemplateFormatVersion: 2010-09-09
Description:
  Batch infrastructure for SGC GWAS row-level validation jobs
Resources:
  EcrRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: sgc-gwas-validator-repo

  BatchServiceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - batch.amazonaws.com
            Action:
              - 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/service-role/AWSBatchServiceRole'

  GwasValidatorComputeEnv:
    Type: AWS::Batch::ComputeEnvironment
    Properties:
      Type: MANAGED
      ServiceRole: !GetAtt BatchServiceRole.Arn
      ComputeResources:
        Type: Fargate
        MaxvCpus: 128
        Subnets:
          - subnet-041ed74e61806c6f0
        SecurityGroupIds:
          - sg-28485f53

  GwasValidatorJobQueue:
    Type: AWS::Batch::JobQueue
    Properties:
      JobQueueName: 'sgc-gwas-validator-queue'
      ComputeEnvironmentOrder:
        - Order: 1
          ComputeEnvironment: !Ref GwasValidatorComputeEnv
      Priority: 1
      State: ENABLED

  GwasValidatorJobDefinition:
    Type: AWS::Batch::JobDefinition
    Properties:
      Type: 'container'
      JobDefinitionName: 'sgc-gwas-validator-job'
      PlatformCapabilities:
        - 'FARGATE'
      Timeout:
        AttemptDurationSeconds: 7200
      ContainerProperties:
        Image: !Sub '${AWS::AccountId}.dkr.ecr.us-east-1.amazonaws.com/sgc-gwas-validator-repo'
        Command:
          - 'python3'
          - 'validate_gwas.py'
          - '--s3-path'
          - 'Ref::s3-path'
          - '--column-mapping'
          - 'Ref::column-mapping'
          - '--progress-s3-key'
          - 'Ref::progress-s3-key'
          - '--bucket'
          - 'Ref::bucket'
        JobRoleArn: !GetAtt GwasValidatorJobRole.Arn
        ExecutionRoleArn: !GetAtt GwasValidatorJobRole.Arn
        ResourceRequirements:
          - Type: 'VCPU'
            Value: '2'
          - Type: 'MEMORY'
            Value: '8192'
        NetworkConfiguration:
          AssignPublicIp: 'ENABLED'
        FargatePlatformConfiguration:
          PlatformVersion: 'LATEST'

  GwasValidatorJobRole:
    Type: 'AWS::IAM::Role'
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: 'Allow'
            Principal:
              Service:
                - 'ecs-tasks.amazonaws.com'
            Action:
              - 'sts:AssumeRole'
      Path: '/'
      Policies:
        - PolicyName: 'S3Access'
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: 'Allow'
                Action:
                  - 's3:GetObject'
                  - 's3:PutObject'
                Resource:
                  - 'arn:aws:s3:::dig-data-registry'
                  - 'arn:aws:s3:::dig-data-registry/*'
                  - 'arn:aws:s3:::dig-data-registry-qa'
                  - 'arn:aws:s3:::dig-data-registry-qa/*'
        - PolicyName: 'ECSTaskExecution'
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: 'Allow'
                Action:
                  - 'ecr:GetAuthorizationToken'
                  - 'ecr:BatchCheckLayerAvailability'
                  - 'ecr:GetDownloadUrlForLayer'
                  - 'ecr:BatchGetImage'
                  - 'logs:CreateLogStream'
                  - 'logs:PutLogEvents'
                Resource: '*'
