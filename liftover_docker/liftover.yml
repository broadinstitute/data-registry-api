AWSTemplateFormatVersion: 2010-09-09
Description: Batch infrastructure for GWAS genome-build liftover jobs (hg19 <-> hg38)

Resources:
  EcrRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: gwas-liftover-repo

  BatchServiceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service: [batch.amazonaws.com]
            Action: ['sts:AssumeRole']
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/service-role/AWSBatchServiceRole'

  LiftoverComputeEnv:
    Type: AWS::Batch::ComputeEnvironment
    Properties:
      Type: MANAGED
      ServiceRole: !GetAtt BatchServiceRole.Arn
      ComputeResources:
        Type: Fargate
        MaxvCpus: 32
        Subnets:
          - subnet-041ed74e61806c6f0
        SecurityGroupIds:
          - sg-28485f53

  LiftoverJobQueue:
    Type: AWS::Batch::JobQueue
    Properties:
      JobQueueName: gwas-liftover-job-queue
      ComputeEnvironmentOrder:
        - Order: 1
          ComputeEnvironment: !Ref LiftoverComputeEnv
      Priority: 1
      State: ENABLED

  LiftoverJobDefinition:
    Type: AWS::Batch::JobDefinition
    Properties:
      Type: container
      JobDefinitionName: gwas-liftover-job
      PlatformCapabilities: [FARGATE]
      Timeout:
        AttemptDurationSeconds: 3600
      RetryStrategy:
        Attempts: 1
      ContainerProperties:
        Image: !Sub '${AWS::AccountId}.dkr.ecr.us-east-1.amazonaws.com/gwas-liftover-repo'
        Command:
          - --input-s3-path
          - Ref::input-s3-path
          - --output-s3-path
          - Ref::output-s3-path
          - --archive-s3-path
          - Ref::archive-s3-path
          - --unmapped-s3-path
          - Ref::unmapped-s3-path
          - --summary-s3-path
          - Ref::summary-s3-path
          - --source-build
          - Ref::source-build
          - --target-build
          - Ref::target-build
          - --column-mapping
          - Ref::column-mapping
          - --job-id
          - Ref::job-id
        JobRoleArn: !GetAtt LiftoverJobRole.Arn
        ExecutionRoleArn: !GetAtt LiftoverJobRole.Arn
        ResourceRequirements:
          - Type: VCPU
            Value: '4'
          - Type: MEMORY
            Value: '16384'
        NetworkConfiguration:
          AssignPublicIp: ENABLED
        FargatePlatformConfiguration:
          PlatformVersion: LATEST
        LogConfiguration:
          LogDriver: awslogs

  LiftoverJobRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service: [ecs-tasks.amazonaws.com]
            Action: ['sts:AssumeRole']
      Path: /
      Policies:
        - PolicyName: S3Access
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                Resource:
                  - 'arn:aws:s3:::dig-data-registry'
                  - 'arn:aws:s3:::dig-data-registry/*'
                  - 'arn:aws:s3:::dig-data-registry-qa'
                  - 'arn:aws:s3:::dig-data-registry-qa/*'
        - PolicyName: ECSTaskExecution
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - ecr:GetAuthorizationToken
                  - ecr:BatchCheckLayerAvailability
                  - ecr:GetDownloadUrlForLayer
                  - ecr:BatchGetImage
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: '*'
