AWSTemplateFormatVersion: 2010-09-09
Description: >
  Batch infrastructure for the QC pipeline. The env image's entrypoint is the
  aws_wrapper, which clones qc-pipeline at a pinned commit, downloads the input +
  reference files from S3, runs the pipeline, and uploads outputs back to S3.
  No Secrets Manager access: the container never touches the DB (the API ingests).
Parameters:
  DataBucket:
    Type: String
    Default: dig-data-registry
Resources:
  EcrRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: qc-pipeline-env-repo

  BatchServiceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service: [batch.amazonaws.com]
            Action: ['sts:AssumeRole']
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/service-role/AWSBatchServiceRole'

  QCComputeEnv:
    Type: AWS::Batch::ComputeEnvironment
    Properties:
      Type: MANAGED
      ServiceRole: !GetAtt BatchServiceRole.Arn
      ComputeResources:
        Type: Fargate
        MaxvCpus: 128
        Subnets:
          - subnet-041ed74e61806c6f0
        SecurityGroupIds:
          - sg-28485f53

  QCJobQueue:
    Type: AWS::Batch::JobQueue
    Properties:
      JobQueueName: qc-pipeline-queue
      ComputeEnvironmentOrder:
        - Order: 1
          ComputeEnvironment: !Ref QCComputeEnv
      Priority: 1
      State: ENABLED

  QCJobDefinition:
    Type: AWS::Batch::JobDefinition
    Properties:
      Type: container
      JobDefinitionName: qc-pipeline-job
      PlatformCapabilities:
        - FARGATE
      Timeout:
        AttemptDurationSeconds: 7200
      ContainerProperties:
        Image: !Sub '${AWS::AccountId}.dkr.ecr.us-east-1.amazonaws.com/qc-pipeline-env-repo'
        Command:
          - '--input-s3-uri'
          - 'Ref::input-s3-uri'
          - '--output-s3-prefix'
          - 'Ref::output-s3-prefix'
          - '--pipeline'
          - 'Ref::pipeline'
          - '--params-json'
          - 'Ref::params-json'
          - '--repo-url'
          - 'Ref::repo-url'
          - '--repo-commit'
          - 'Ref::repo-commit'
        JobRoleArn: !GetAtt QCJobRole.Arn
        ExecutionRoleArn: !GetAtt QCJobRole.Arn
        ResourceRequirements:
          - Type: VCPU
            Value: '2'
          - Type: MEMORY
            Value: '8192'
        NetworkConfiguration:
          AssignPublicIp: ENABLED
        FargatePlatformConfiguration:
          PlatformVersion: LATEST

  QCJobRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: [ecs-tasks.amazonaws.com]
            Action: ['sts:AssumeRole']
      Path: '/'
      Policies:
        - PolicyName: S3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: ['s3:GetObject', 's3:PutObject']
                Resource:
                  - !Sub 'arn:aws:s3:::${DataBucket}'
                  - !Sub 'arn:aws:s3:::${DataBucket}/*'
        - PolicyName: ECSTaskExecution
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'ecr:GetAuthorizationToken'
                  - 'ecr:BatchCheckLayerAvailability'
                  - 'ecr:GetDownloadUrlForLayer'
                  - 'ecr:BatchGetImage'
                  - 'logs:CreateLogStream'
                  - 'logs:PutLogEvents'
                Resource: '*'
        # DECISION (see Decisions #1): uncomment ONLY if the qc-pipeline remote is
        # AWS CodeCommit (private clone via IAM, no stored secret in the container):
        # - PolicyName: CodeCommitPull
        #   PolicyDocument:
        #     Version: '2012-10-17'
        #     Statement:
        #       - Effect: Allow
        #         Action: ['codecommit:GitPull']
        #         Resource: !Sub 'arn:aws:codecommit:us-east-1:${AWS::AccountId}:qc-pipeline'
